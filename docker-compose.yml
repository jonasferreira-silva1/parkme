# =============================================================
# DOCKER COMPOSE — ParkMe (raiz do monorepo)
#
# Sobe toda a stack com um único comando:
#   docker compose up -d
#
# Para parar:
#   docker compose down
#
# Para apagar tudo (incluindo volumes):
#   docker compose down -v
#
# Serviços:
#   postgres     → banco de dados          (porta 5433)
#   redis        → cache e filas           (porta 6379)
#   api          → backend NestJS          (porta 3000)
#   frontend     → dashboard Next.js       (porta 3001)
#   redis-ui     → painel visual do Redis  (porta 8081)
# =============================================================

services:

  # -----------------------------------------------------------
  # PostgreSQL — banco de dados principal
  # Porta 5433 no host para não conflitar com instalação local
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: parkme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     parkme
      POSTGRES_PASSWORD: parkme123
      POSTGRES_DB:       parkme_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkme -d parkme_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Redis — cache de sessões e filas BullMQ
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: parkme_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # API — backend NestJS
  # Aguarda o postgres estar saudável antes de iniciar
  # -----------------------------------------------------------
  api:
    build:
      context: ./parkme-api
      dockerfile: Dockerfile
    container_name: parkme_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:           postgresql://parkme:parkme123@postgres:5432/parkme_db
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      JWT_SECRET:             parkme-jwt-secret-dev-mude-em-producao
      JWT_EXPIRES_IN:         15m
      JWT_REFRESH_SECRET:     parkme-refresh-secret-dev-mude-em-producao
      JWT_REFRESH_EXPIRES_IN: 7d
      MERCADOPAGO_ACCESS_TOKEN: TEST-seu-token-aqui
      PORT:                   3000
      NODE_ENV:               development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -----------------------------------------------------------
  # Frontend — dashboard Next.js
  # Aguarda a API estar de pé antes de iniciar
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parkme_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL:  http://localhost:3000
      # URL interna usada pelo Next.js server-side (dentro da rede Docker)
      API_INTERNAL_URL:    http://api:3000
    depends_on:
      - api

  # -----------------------------------------------------------
  # Redis Commander — painel visual do Redis
  # Acesse em: http://localhost:8081
  # -----------------------------------------------------------
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: parkme_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis

# -----------------------------------------------------------
# Volumes — dados persistem entre reinicializações
# -----------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
